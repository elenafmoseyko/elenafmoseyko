name: WakaTime Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate WakaTime statistics
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          SHOW_TIMEZONE: true
          SHOW_LANGUAGE: true
          SHOW_OS: true
          SHOW_PROJECTS: true
          SHOW_EDITORS: true
          SHOW_LANGUAGE_PER_REPO: true
          SHOW_SHORT_INFO: true
          SHOW_COMMIT: true
          SHOW_DAYS_OF_WEEK: true
          SHOW_TOTAL_CODE_TIME: true
          SHOW_UPDATED_DATE: true
          SHOW_PROFILE_VIEWS: false
          SHOW_LINES_OF_CODE: true

          COMMIT_SINGLE: false
          LOCALE: en

      - name: Commit and push README
        run: |
          git config user.name "elenafmoseyko"
          git config user.email "moseykoelena@hotmail.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "Update WakaTime profile statistics"
          git push
