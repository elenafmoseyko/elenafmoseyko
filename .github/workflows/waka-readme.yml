name: WakaTime Profile Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

          PULL_BRANCH_NAME: main
          PUSH_BRANCH_NAME: waka-stats

          SHOW_TIMEZONE: true
          SHOW_LANGUAGE: true
          SHOW_OS: true
          SHOW_PROJECTS: true
          SHOW_EDITORS: true
          SHOW_LANGUAGE_PER_REPO: true
          SHOW_SHORT_INFO: true
          SHOW_COMMIT: true
          SHOW_DAYS_OF_WEEK: true
          SHOW_TOTAL_CODE_TIME: true
          SHOW_UPDATED_DATE: true
          SHOW_PROFILE_VIEWS: false
          SHOW_LINES_OF_CODE: true

          COMMIT_BY_ME: true
          COMMIT_USERNAME: elenafmoseyko
          COMMIT_EMAIL: moseykoelena@hotmail.com
          COMMIT_MESSAGE: Update WakaTime profile statistics

          LOCALE: en
