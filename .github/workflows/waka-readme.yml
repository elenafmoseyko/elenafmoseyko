name: WakaTime Coding Activity

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest

    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: waka
          TIME_RANGE: last_30_days
          LANG_COUNT: 8
          SHOW_TIME: true
          SHOW_TOTAL: true
          CODE_LANG: text
          COMMIT_MESSAGE: Update WakaTime coding activity
